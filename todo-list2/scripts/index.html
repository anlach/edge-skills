<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .add-form {
      display: flex;
      padding: 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }
    .add-form input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus {
      border-color: #667eea;
    }
    .add-form button {
      margin-left: 10px;
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .add-form button:hover {
      background: #5a6fd6;
    }
    .todo-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #f1f3f4;
      transition: background 0.2s;
    }
    .todo-item:hover {
      background: #f8f9fa;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #adb5bd;
    }
    .todo-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #667eea;
      border-radius: 50%;
      margin-right: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .todo-checkbox:hover {
      background: #e9ecef;
    }
    .todo-item.completed .todo-checkbox {
      background: #667eea;
    }
    .todo-item.completed .todo-checkbox::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }
    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #333;
    }
    .delete-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: #ff6b6b;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .todo-item:hover .delete-btn {
      opacity: 1;
    }
    .delete-btn:hover {
      background: #ee5a5a;
    }
    .clear-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #f8f9fa;
      border: none;
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .clear-btn:hover {
      background: #e9ecef;
    }
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #adb5bd;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    .count-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 Todo List</h1>
      <div class="count-badge"><span id="count">0</span> tasks</div>
    </div>
    <form class="add-form" onsubmit="handleAdd(event)">
      <input type="text" id="todoInput" placeholder="Add a new task..." autocomplete="off">
      <button type="submit">Add</button>
    </form>
    <ul class="todo-list" id="todoList"></ul>
    <button class="clear-btn" onclick="clearCompleted()" id="clearBtn" style="display:none;">Clear Completed</button>
  </div>

  <script>
    // Initialize from localStorage or empty array
    let todos = JSON.parse(localStorage.getItem('edgeTodos') || '[]');

    // Save to localStorage
    function saveTodos() {
      localStorage.setItem('edgeTodos', JSON.stringify(todos));
      render();
    }

    // Render the todo list
    function render() {
      const list = document.getElementById('todoList');
      const count = document.getElementById('count');
      const clearBtn = document.getElementById('clearBtn');
      
      count.textContent = todos.length;
      
      const completedCount = todos.filter(t => t.completed).length;
      clearBtn.style.display = completedCount > 0 ? 'block' : 'none';
      
      if (todos.length === 0) {
        list.innerHTML = '<li class="empty-state"><div class="empty-state-icon">✨</div><p>No tasks yet!<br>Add one above.</p></li>';
        return;
      }
      
      list.innerHTML = todos.map((todo, index) => `
        <li class="todo-item ${todo.completed ? 'completed' : ''}" data-index="${index}">
          <div class="todo-checkbox" onclick="toggleTodo(${index})"></div>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${index})">×</button>
        </li>
      `).join('');
      
      // Update AI Edge Gallery result
      if (typeof ai_edge_gallery_get_result === 'function') {
        const result = todos.map((t, i) => `${t.completed ? '✓' : '○'} ${t.text}`).join('\n');
        ai_edge_gallery_get_result(result || 'No tasks');
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Add a new todo
    function addTodo(text) {
      if (!text || !text.trim()) return;
      todos.push({ text: text.trim(), completed: false });
      saveTodos();
    }

    // Toggle todo completion
    function toggleTodo(index) {
      if (todos[index]) {
        todos[index].completed = !todos[index].completed;
        saveTodos();
      }
    }

    // Delete a todo
    function deleteTodo(index) {
      todos.splice(index, 1);
      saveTodos();
    }

    // Clear completed todos
    function clearCompleted() {
      todos = todos.filter(t => !t.completed);
      saveTodos();
    }

    // Handle form submission
    function handleAdd(event) {
      event.preventDefault();
      const input = document.getElementById('todoInput');
      addTodo(input.value);
      input.value = '';
      input.focus();
    }

    // Initialize on load
    render();

    // Expose functions globally for AI Edge Gallery
    window.addTodo = addTodo;
    window.toggleTodo = toggleTodo;
    window.deleteTodo = deleteTodo;
    window.clearCompleted = clearCompleted;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 16px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #00d9ff;
    }
    button#addBtn {
      padding: 12px 24px;
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button#addBtn:hover { background: #00b8d4; }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #16213e;
      margin-bottom: 8px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    li:hover { background: #1f2b4d; }
    li.completed { opacity: 0.5; }
    li.completed span { text-decoration: line-through; }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
    }
    span {
      flex: 1;
      font-size: 16px;
    }
    .delete-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .delete-btn:hover { background: #ff6b7a; }
    .clear-btn {
      background: #ff9f43;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 15px;
    }
    .clear-btn:hover { background: #ffb166; }
    .empty { text-align: center; color: #666; padding: 40px; }
  </style>
</head>
<body>
  <h1>✓ Todo List</h1>
  <div class="input-group">
    <input type="text" id="todoInput" placeholder="Add a new task..." onkeypress="handleKeyPress(event)">
    <button id="addBtn" onclick="addTodo()">Add</button>
  </div>
  <ul id="todoList"></ul>
  <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>

  <script>
    // Load todos from localStorage
    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem('edgeTodos') || '[]');
      } catch(e) { return []; }
    }

    // Save todos to localStorage
    function saveTodos(todos) {
      try {
        localStorage.setItem('edgeTodos', JSON.stringify(todos));
      } catch(e) { console.error('Save failed:', e); }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Render the todo list
    function render() {
      const todos = loadTodos();
      const list = document.getElementById('todoList');
      list.innerHTML = '';

      if (todos.length === 0) {
        list.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>';
        return;
      }

      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        if (todo.completed) li.className = 'completed';
        li.innerHTML = `
          <input type="checkbox" ${todo.completed ? 'checked' : ''} 
            onchange="toggleTodo(${index})">
          <span>${escapeHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${index})">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    // Add a new todo
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;

      const todos = loadTodos();
      todos.push({ text: text, completed: false });
      saveTodos(todos);
      input.value = '';
      render();
      
      if (typeof ai_EDGE_ALLERY_set_result === 'function') {
        ai_EDGE_ALLERY_set_result('Added: ' + text);
      }
    }

    // Toggle todo completion
    function toggleTodo(index) {
      const todos = loadTodos();
      todos[index].completed = !todos[index].completed;
      saveTodos(todos);
      render();
      
      if (typeof ai_EDGE_ALLERY_set_result === 'function') {
        ai_EDGE_ALLERY_set_result(todos[index].completed ? 'Completed: ' + todos[index].text : 'Undone: ' + todos[index].text);
      }
    }

    // Delete a todo
    function deleteTodo(index) {
      const todos = loadTodos();
      const deleted = todos.splice(index, 1)[0];
      saveTodos(todos);
      render();
      
      if (typeof ai_EDGE_ALLERY_set_result === 'function') {
        ai_EDGE_ALLERY_set_result('Deleted: ' + deleted.text);
      }
    }

    // Clear completed todos
    function clearCompleted() {
      const todos = loadTodos();
      const before = todos.length;
      todos = todos.filter(function(t) { return !t.completed; });
      saveTodos(todos);
      render();
      
      if (typeof ai_EDGE_ALLERY_set_result === 'function') {
        ai_EDGE_ALLERY_set_result('Cleared ' + (before - todos.length) + ' completed items');
      }
    }

    // Handle Enter key
    function handleKeyPress(e) {
      if (e.key === 'Enter') addTodo();
    }

    // Expose functions for Edge Gallery to call
    window.todoAPI = {
      add: function(text) {
        if (!text) return;
        const todos = loadTodos();
        todos.push({ text: text, completed: false });
        saveTodos(todos);
        render();
      },
      clear: function() {
        clearCompleted();
      },
      getTodos: function() {
        return loadTodos();
      }
    };

    // Initial render
    render();
  </script>
</body>
</html>

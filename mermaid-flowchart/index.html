<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Flowchart Renderer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <div id="chart-container"></div>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });

        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const jsonData = JSON.parse(data);
                const mermaidCode = jsonData.mermaid || jsonData.code || '';

                if (!mermaidCode || typeof mermaidCode !== 'string') {
                    return JSON.stringify({
                        error: 'No mermaid code provided. Please provide mermaid flowchart syntax.'
                    });
                }

                // Generate unique ID for this render
                const id = 'mermaid-chart-' + Math.random().toString(36).substr(2, 9);

                // Render the mermaid diagram (returns { svg, bindFunctions })
                const { svg } = await mermaid.render(id, mermaidCode);

                return JSON.stringify({
                    success: true,
                    svg: svg,
                    mermaidCode: mermaidCode
                });

            } catch (e) {
                console.error(e);
                return JSON.stringify({
                    error: `Failed to render flowchart: ${e.message}`,
                    details: e.stack
                });
            }
        };
    </script>
</body>
</html>

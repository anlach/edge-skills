<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <div id="chart"></div>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });
        
        window['ai_edge_gallery_get_result'] = function(data) {
            try {
                var input = JSON.parse(data);
                var code = input.mermaid || input.code || '';
                
                if (!code) {
                    return JSON.stringify({ error: 'No mermaid code provided' });
                }
                
                var id = 'chart-' + Math.random().toString(36).substr(2, 9);
                var result = mermaid.render(id, code);
                
                return JSON.stringify({
                    success: true,
                    svg: result.svg,
                    mermaidCode: code
                });
            } catch (e) {
                return JSON.stringify({ error: e.message, stack: e.stack });
            }
        };
    </script>
</body>
</html>

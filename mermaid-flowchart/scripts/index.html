<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <canvas id="render-canvas" style="display: none;"></canvas>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
        });

        // Extract mermaid code from the data parameter.
        // The Edge Gallery app may pass data with raw newlines and unescaped
        // double quotes (e.g. pie chart syntax: "Dogs" : 386), which breaks
        // JSON.parse. We use a multi-strategy approach.
        function extractMermaidCode(data) {
            if (typeof data !== 'string') return data || '';

            // Strategy 1: Standard JSON parse after sanitizing control characters.
            const sanitized = data.replace(/[\x00-\x1f]/g, (ch) => {
                const code = ch.charCodeAt(0);
                switch(code) {
                    case 0x0a: return '\\n';
                    case 0x0d: return '\\r';
                    case 0x09: return '\\t';
                    default: return '\\u' + ('0000' + code.toString(16)).slice(-4);
                }
            });
            try {
                const json = JSON.parse(sanitized);
                return json.mermaid || json.code || '';
            } catch(e) { /* fall through */ }

            // Strategy 2: Extract value from {"mermaid":"..."} or {"code":"..."}
            // even if the JSON is broken by raw quotes/newlines inside the value.
            const keyMatch = data.match(/"(?:mermaid|code)"\s*:\s*"/);
            if (keyMatch) {
                const startIdx = keyMatch.index + keyMatch[0].length;
                const lastBrace = data.lastIndexOf('"}');
                const endIdx = lastBrace > startIdx ? lastBrace : data.lastIndexOf('"');
                if (endIdx > startIdx) {
                    let raw = data.substring(startIdx, endIdx);
                    raw = raw.replace(/\\n/g, '\n').replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                    return raw;
                }
            }

            // Strategy 3: The entire data string is raw mermaid code.
            return data;
        }

        window['ai_edge_gallery_get_result'] = async (data, secret) => {
            try {
                const mermaidCode = extractMermaidCode(data);

                if (!mermaidCode || typeof mermaidCode !== 'string') {
                    return JSON.stringify({ result: null, image: null, error: 'No mermaid code provided.' });
                }

                // Render mermaid to SVG.
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                const { svg } = await mermaid.render(id, mermaidCode);

                // Parse SVG dimensions.
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svg, 'image/svg+xml');
                const svgEl = svgDoc.querySelector('svg');
                const vb = svgEl.getAttribute('viewBox');
                let w = 800, h = 600;
                if (vb) {
                    const parts = vb.split(/[\s,]+/).map(Number);
                    if (parts.length === 4) { w = parts[2]; h = parts[3]; }
                }
                const ew = svgEl.getAttribute('width');
                const eh = svgEl.getAttribute('height');
                if (ew && !ew.endsWith('%')) w = parseFloat(ew);
                if (eh && !eh.endsWith('%')) h = parseFloat(eh);

                // Use data URI instead of blob URL to avoid tainted canvas.
                const svgDataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

                // Draw onto canvas.
                const scale = 2;
                const canvasW = Math.min(Math.round(w * scale), 2048);
                const canvasH = Math.min(Math.round(h * scale), 2048);

                const base64 = await new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('render-canvas');
                        canvas.width = canvasW;
                        canvas.height = canvasH;
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvasW, canvasH);
                        ctx.drawImage(img, 0, 0, canvasW, canvasH);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.onerror = () => reject(new Error('Failed to load SVG'));
                    img.src = svgDataUri;
                });

                return JSON.stringify({
                    result: 'Flowchart rendered',
                    image: { base64: base64 },
                    error: null
                });

            } catch (e) {
                console.error(e);
                return JSON.stringify({ result: null, image: null, error: 'Failed: ' + e.message });
            }
        };
    </script>
</body>
</html>

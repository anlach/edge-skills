<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis'
            }
        });

        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                // Sanitize: escape any raw control characters (U+0000-U+001F)
                // before parsing. The Edge Gallery app may pass JSON with
                // unescaped newlines in mermaid syntax, which JSON.parse rejects.
                const sanitized = data.replace(/[\x00-\x1f]/g, (ch) => {
                    const code = ch.charCodeAt(0);
                    switch(code) {
                        case 0x0a: return '\\n';
                        case 0x0d: return '\\r';
                        case 0x09: return '\\t';
                        default: return '\\u' + ('0000' + code.toString(16)).slice(-4);
                    }
                });
                const jsonData = JSON.parse(sanitized);
                const mermaidCode = jsonData.mermaid || jsonData.code || '';

                if (!mermaidCode || typeof mermaidCode !== 'string') {
                    return JSON.stringify({
                        error: 'No mermaid code provided. Please provide mermaid flowchart syntax.'
                    });
                }

                // Generate unique ID for this render
                const id = 'mermaid-chart-' + Math.random().toString(36).substr(2, 9);

                // Render the mermaid diagram (returns { svg, bindFunctions })
                const { svg } = await mermaid.render(id, mermaidCode);

                return JSON.stringify({
                    result: svg
                });

            } catch (e) {
                console.error(e);
                return JSON.stringify({
                    error: `Failed to render flowchart: ${e.message}`,
                    details: e.stack
                });
            }
        };
    </script>
</body>
</html>

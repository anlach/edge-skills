<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <canvas id="render-canvas" style="display: none;"></canvas>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
        });

        window['ai_edge_gallery_get_result'] = async (data, secret) => {
            try {
                // Sanitize raw control characters before JSON.parse.
                const sanitized = data.replace(/[\x00-\x1f]/g, (ch) => {
                    const code = ch.charCodeAt(0);
                    switch(code) {
                        case 0x0a: return '\\n';
                        case 0x0d: return '\\r';
                        case 0x09: return '\\t';
                        default: return '\\u' + ('0000' + code.toString(16)).slice(-4);
                    }
                });
                const jsonData = JSON.parse(sanitized);
                const mermaidCode = jsonData.mermaid || jsonData.code || '';

                if (!mermaidCode || typeof mermaidCode !== 'string') {
                    return JSON.stringify({ result: null, image: null, error: 'No mermaid code provided.' });
                }

                // Render mermaid to SVG.
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                const { svg } = await mermaid.render(id, mermaidCode);

                // Parse SVG dimensions.
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svg, 'image/svg+xml');
                const svgEl = svgDoc.querySelector('svg');
                const vb = svgEl.getAttribute('viewBox');
                let w = 800, h = 600;
                if (vb) {
                    const parts = vb.split(/[\s,]+/).map(Number);
                    if (parts.length === 4) { w = parts[2]; h = parts[3]; }
                }
                const ew = svgEl.getAttribute('width');
                const eh = svgEl.getAttribute('height');
                if (ew && !ew.endsWith('%')) w = parseFloat(ew);
                if (eh && !eh.endsWith('%')) h = parseFloat(eh);

                // Use data URI instead of blob URL to avoid tainted canvas.
                const svgDataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

                // Draw onto canvas.
                const scale = 2;
                const canvasW = Math.min(Math.round(w * scale), 2048);
                const canvasH = Math.min(Math.round(h * scale), 2048);

                const base64 = await new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.getElementById('render-canvas');
                        canvas.width = canvasW;
                        canvas.height = canvasH;
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvasW, canvasH);
                        ctx.drawImage(img, 0, 0, canvasW, canvasH);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.onerror = () => reject(new Error('Failed to load SVG'));
                    img.src = svgDataUri;
                });

                return JSON.stringify({
                    result: 'Flowchart rendered',
                    image: { base64: base64 },
                    error: null
                });

            } catch (e) {
                console.error(e);
                return JSON.stringify({ result: null, image: null, error: 'Failed: ' + e.message });
            }
        };
    </script>
</body>
</html>

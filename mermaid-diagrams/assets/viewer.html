<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mermaid Diagram</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1a2e; color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            display: flex; flex-direction: column; width: 100%; height: 100%;
        }

        /* Zoom / pan area fills available space above chips */
        #zoom-area {
            flex: 1; position: relative; overflow: hidden;
            touch-action: none;
            -webkit-user-select: none; user-select: none;
            background: #1a1a2e;
        }
        #zoom-target {
            position: absolute; transform-origin: 0 0;
            will-change: transform;
        }
        #zoom-target svg {
            display: block; max-width: none; max-height: none;
        }

        /* Zoom indicator */
        #zoom-info {
            position: absolute; top: 8px; right: 8px;
            font-size: 11px; color: #8888aa;
            background: rgba(17,17,34,0.8);
            padding: 3px 8px; border-radius: 6px;
            z-index: 5; pointer-events: none;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }

        /* Hint text that fades away */
        #hint {
            position: absolute; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: #999;
            padding: 5px 14px; border-radius: 16px;
            font-size: 11px; z-index: 5; pointer-events: none;
            white-space: nowrap;
            transition: opacity 0.8s ease;
        }

        /* Chip bar at bottom */
        .chip-bar {
            display: flex; gap: 8px; padding: 8px 10px;
            justify-content: center; flex-wrap: wrap;
            background: rgba(26,26,46,0.95);
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.06);
            color: #c0c0e0; cursor: pointer;
            font-size: 12px; font-family: inherit;
            transition: background 0.12s ease;
            -webkit-user-select: none; user-select: none;
        }
        .chip:active { background: rgba(255,255,255,0.14); }
        .chip svg { width: 14px; height: 14px; flex-shrink: 0; }
        .chip.success { background: rgba(46,125,50,0.35); border-color: #4caf50; color: #a5d6a7; }

        /* Loading */
        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 20;
            background: #1a1a2e;
        }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #333;
            border-top: 3px solid #7c4dff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        #error-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            padding: 12px 20px; background: #c62828; color: white;
            border-radius: 8px; font-size: 13px; display: none;
            max-width: 90%; word-break: break-word; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="zoom-area">
            <div id="zoom-target"></div>
            <div id="zoom-info">1.0x</div>
            <div id="hint">Pinch to zoom \u00b7 Drag to pan \u00b7 Double-tap to reset</div>
        </div>
        <div class="chip-bar">
            <button class="chip" id="copy-code-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Code
            </button>
        </div>
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:12px; color:#aaa; font-size:13px;">Rendering diagram...</p>
        </div>
        <div id="error-msg"></div>
    </div>

    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#1e1e2e',
                primaryColor: '#2d2d44',
                primaryTextColor: '#e0e0e0',
                primaryBorderColor: '#4a4a6a',
                lineColor: '#7c7caa',
                secondaryColor: '#2a2a3d',
                tertiaryColor: '#252538',
                fontFamily: 'system-ui, -apple-system, sans-serif',
                fontSize: '14px'
            },
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            sequence: { useMaxWidth: true },
            er: { useMaxWidth: true }
        });

        // ── STATE ──
        var _mermaidCode = '';
        var _svgW = 800, _svgH = 600;

        var zoomState = { scale: 1, panX: 0, panY: 0, minScale: 0.1, maxScale: 20 };
        var gesture = {
            startPanX: 0, startPanY: 0, startX: 0, startY: 0,
            initScale: 1, initPanX: 0, initPanY: 0,
            initDist: 0, initMidX: 0, initMidY: 0,
            lastTapTime: 0
        };

        var CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

        // ── COPY ──

        document.getElementById('copy-code-btn').addEventListener('click', function() {
            var btn = this;
            if (!_mermaidCode) return;
            try {
                navigator.clipboard.writeText(_mermaidCode).then(function() {
                    flashChip(btn, 'Copied!');
                }).catch(function() {
                    fallbackCopy(_mermaidCode, btn);
                });
            } catch (e) {
                fallbackCopy(_mermaidCode, btn);
            }
        });

        function fallbackCopy(text, btn) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); flashChip(btn, 'Copied!'); }
            catch (e) { flashChip(btn, 'Failed'); }
            document.body.removeChild(ta);
        }

        function flashChip(btn, label) {
            var orig = btn.innerHTML;
            btn.classList.add('success');
            btn.innerHTML = CHECK_SVG + ' ' + label;
            setTimeout(function() { btn.classList.remove('success'); btn.innerHTML = orig; }, 1800);
        }

        // ── ZOOM / PAN ──

        function fitToArea() {
            var area = document.getElementById('zoom-area');
            var aW = area.clientWidth;
            var aH = area.clientHeight;
            if (aW === 0 || aH === 0) return;
            var fitScale = Math.min(aW / _svgW, aH / _svgH);
            zoomState.scale = fitScale;
            zoomState.panX = (aW - _svgW * fitScale) / 2;
            zoomState.panY = (aH - _svgH * fitScale) / 2;
            applyZoom();
        }

        function applyZoom() {
            var target = document.getElementById('zoom-target');
            target.style.transform = 'translate(' + zoomState.panX + 'px,' + zoomState.panY + 'px) scale(' + zoomState.scale + ')';
            var area = document.getElementById('zoom-area');
            var fitScale = Math.min(area.clientWidth / _svgW, area.clientHeight / _svgH);
            var zoomX = Math.round(zoomState.scale / fitScale * 10) / 10;
            document.getElementById('zoom-info').textContent = zoomX.toFixed(1) + 'x';
        }

        function getDist(t1, t2) {
            var dx = t1.clientX - t2.clientX;
            var dy = t1.clientY - t2.clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        var zoomArea = document.getElementById('zoom-area');

        zoomArea.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                gesture.startPanX = zoomState.panX;
                gesture.startPanY = zoomState.panY;
                gesture.startX = e.touches[0].clientX;
                gesture.startY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                gesture.initScale = zoomState.scale;
                gesture.initPanX = zoomState.panX;
                gesture.initPanY = zoomState.panY;
                gesture.initDist = getDist(e.touches[0], e.touches[1]);
                gesture.initMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                gesture.initMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: false });

        zoomArea.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                var dx = e.touches[0].clientX - gesture.startX;
                var dy = e.touches[0].clientY - gesture.startY;
                zoomState.panX = gesture.startPanX + dx;
                zoomState.panY = gesture.startPanY + dy;
                applyZoom();
            } else if (e.touches.length === 2) {
                var newDist = getDist(e.touches[0], e.touches[1]);
                var ratio = newDist / gesture.initDist;
                var newScale = gesture.initScale * ratio;
                var area = document.getElementById('zoom-area');
                var fitScale = Math.min(area.clientWidth / _svgW, area.clientHeight / _svgH);
                zoomState.minScale = fitScale * 0.3;
                zoomState.maxScale = fitScale * 12;
                newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, newScale));

                var midX = gesture.initMidX;
                var midY = gesture.initMidY;
                zoomState.panX = midX - (midX - gesture.initPanX) * (newScale / gesture.initScale);
                zoomState.panY = midY - (midY - gesture.initPanY) * (newScale / gesture.initScale);
                zoomState.scale = newScale;
                applyZoom();
            }
        }, { passive: false });

        zoomArea.addEventListener('touchend', function(e) {
            if (e.touches.length === 0) {
                var now = Date.now();
                if (now - gesture.lastTapTime < 300) {
                    var area = document.getElementById('zoom-area');
                    var fitScale = Math.min(area.clientWidth / _svgW, area.clientHeight / _svgH);
                    if (Math.abs(zoomState.scale - fitScale) > fitScale * 0.1) {
                        // Zoomed in — reset to fit
                        fitToArea();
                    } else {
                        // At fit — zoom to 3x centered on tap
                        var tapX = e.changedTouches[0].clientX;
                        var tapY = e.changedTouches[0].clientY;
                        var newScale = fitScale * 3;
                        zoomState.panX = tapX - (tapX - zoomState.panX) * (newScale / zoomState.scale);
                        zoomState.panY = tapY - (tapY - zoomState.panY) * (newScale / zoomState.scale);
                        zoomState.scale = newScale;
                        applyZoom();
                    }
                }
                gesture.lastTapTime = now;
            }
        }, { passive: false });

        // Re-center on orientation change
        var resizeTimer = null;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(fitToArea, 150);
        });

        // ── MERMAID CODE FROM URL ──

        function getMermaidCode() {
            var hash = window.location.hash;
            if (hash && hash.length > 1) {
                try {
                    var encoded = hash.substring(1);
                    var decoded = atob(encoded);
                    var bytes = new Uint8Array(decoded.length);
                    for (var i = 0; i < decoded.length; i++) bytes[i] = decoded.charCodeAt(i);
                    return new TextDecoder().decode(bytes);
                } catch (e) {
                    return decodeURIComponent(hash.substring(1));
                }
            }
            return '';
        }

        // ── RENDER ──

        (function() {
            var code = getMermaidCode();
            if (!code) {
                document.getElementById('loading').style.display = 'none';
                var err = document.getElementById('error-msg');
                err.textContent = 'No mermaid code provided.';
                err.style.display = 'block';
                return;
            }
            _mermaidCode = code;

            var id = 'mv-' + Math.random().toString(36).substr(2, 9);
            mermaid.render(id, code).then(function(result) {
                var target = document.getElementById('zoom-target');
                target.innerHTML = result.svg;

                var svgEl = target.querySelector('svg');
                if (svgEl) {
                    var vb = svgEl.getAttribute('viewBox');
                    if (vb) {
                        var parts = vb.split(/[\s,]+/).map(Number);
                        if (parts.length === 4) { _svgW = parts[2]; _svgH = parts[3]; }
                    }
                    var ew = svgEl.getAttribute('width');
                    var eh = svgEl.getAttribute('height');
                    if (ew && !ew.endsWith('%')) _svgW = parseFloat(ew);
                    if (eh && !eh.endsWith('%')) _svgH = parseFloat(eh);
                    svgEl.setAttribute('width', _svgW);
                    svgEl.setAttribute('height', _svgH);
                    svgEl.style.maxWidth = 'none';
                    svgEl.style.maxHeight = 'none';
                }

                document.getElementById('loading').style.display = 'none';

                // Fit diagram to area
                fitToArea();

                // Fade hint after 3 seconds
                setTimeout(function() {
                    var hint = document.getElementById('hint');
                    if (hint) hint.style.opacity = '0';
                }, 3000);
            }).catch(function(e) {
                document.getElementById('loading').style.display = 'none';
                var err = document.getElementById('error-msg');
                err.textContent = 'Error: ' + e.message;
                err.style.display = 'block';
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Mermaid Diagram</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1a1a2e; color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        #diagram-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 12px; width: 100%;
        }
        #diagram-wrapper {
            position: relative; display: inline-block; background: #1e1e2e;
            border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            overflow: hidden; padding: 12px; max-width: 100%;
        }
        #diagram-wrapper img {
            display: block; max-width: 100%; height: auto; border-radius: 4px;
        }
        .btn-bar {
            display: flex; gap: 8px; margin-top: 10px; justify-content: center; flex-wrap: wrap;
        }
        .btn-bar button {
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            background: rgba(255,255,255,0.08); color: #e0e0e0;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; font-size: 13px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: all 0.15s ease;
        }
        .btn-bar button:hover { background: rgba(255,255,255,0.15); }
        .btn-bar button:active { transform: scale(0.97); }
        .btn-bar button.copied { background: #2e7d32; border-color: #4caf50; color: #fff; }
        .btn-bar button svg { width: 16px; height: 16px; flex-shrink: 0; }
        #status-msg {
            margin-top: 8px; font-size: 13px; color: #aaa;
            text-align: center; min-height: 18px;
        }
        #error-msg {
            margin-top: 10px; padding: 10px 16px; background: #c62828; color: white;
            border-radius: 8px; font-size: 13px; display: none;
            max-width: 100%; word-break: break-word;
        }
        #loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 40px; width: 100%;
        }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #333;
            border-top: 3px solid #7c4dff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="diagram-container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:12px; color:#aaa; font-size:13px;">Rendering diagram...</p>
        </div>
        <div id="diagram-wrapper" style="display:none;">
            <img id="diagram-img" src="" alt="Mermaid Diagram" />
        </div>
        <div class="btn-bar" id="btn-bar" style="display:none;">
            <button id="copy-code-btn" title="Copy Mermaid source code">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>Copy Code</span>
            </button>
            <button id="save-img-btn" title="Save diagram as image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span>Save Image</span>
            </button>
        </div>
        <div id="status-msg"></div>
        <div id="error-msg"></div>
    </div>

    <canvas id="render-canvas" style="display: none;"></canvas>

    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#1e1e2e',
                primaryColor: '#2d2d44',
                primaryTextColor: '#e0e0e0',
                primaryBorderColor: '#4a4a6a',
                lineColor: '#7c7caa',
                secondaryColor: '#2a2a3d',
                tertiaryColor: '#252538',
                fontFamily: 'system-ui, -apple-system, sans-serif',
                fontSize: '14px'
            },
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            sequence: { useMaxWidth: true },
            er: { useMaxWidth: true }
        });

        var _mermaidCode = '';
        var _pngBase64 = '';

        var CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

        // Copy Mermaid source code as plain text (works in WebView).
        document.getElementById('copy-code-btn').addEventListener('click', function() {
            var btn = document.getElementById('copy-code-btn');
            var statusMsg = document.getElementById('status-msg');

            if (!_mermaidCode) {
                statusMsg.textContent = 'Nothing to copy.';
                return;
            }

            try {
                navigator.clipboard.writeText(_mermaidCode).then(function() {
                    var origHTML = btn.innerHTML;
                    btn.classList.add('copied');
                    btn.innerHTML = CHECK_ICON + '<span>Copied!</span>';
                    statusMsg.textContent = 'Mermaid code copied to clipboard \u2713';
                    setTimeout(function() {
                        btn.classList.remove('copied');
                        btn.innerHTML = origHTML;
                        statusMsg.textContent = '';
                    }, 2000);
                }).catch(function() {
                    // Fallback: select text in a textarea.
                    fallbackCopyText(_mermaidCode, statusMsg);
                });
            } catch (e) {
                fallbackCopyText(_mermaidCode, statusMsg);
            }
        });

        // Fallback copy for WebViews without clipboard API.
        function fallbackCopyText(text, statusMsg) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                statusMsg.textContent = 'Mermaid code copied to clipboard \u2713';
            } catch (e) {
                statusMsg.textContent = 'Copy failed \u2014 long-press the code to select it';
            }
            document.body.removeChild(ta);
        }

        // Save image via download link.
        document.getElementById('save-img-btn').addEventListener('click', function() {
            var btn = document.getElementById('save-img-btn');
            var statusMsg = document.getElementById('status-msg');

            if (!_pngBase64) {
                statusMsg.textContent = 'No image to save.';
                return;
            }

            try {
                var link = document.createElement('a');
                link.download = 'mermaid-diagram.png';
                link.href = _pngBase64;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                var origHTML = btn.innerHTML;
                btn.classList.add('copied');
                btn.innerHTML = CHECK_ICON + '<span>Saved!</span>';
                statusMsg.textContent = 'Image downloaded \u2713';
                setTimeout(function() {
                    btn.classList.remove('copied');
                    btn.innerHTML = origHTML;
                    statusMsg.textContent = '';
                }, 2000);
            } catch (e) {
                statusMsg.textContent = 'Save failed \u2014 try long-press the image instead';
            }
        });

        // Read mermaid code from URL hash (base64-encoded by scripts/index.html).
        function getMermaidCode() {
            var hash = window.location.hash;
            if (hash && hash.length > 1) {
                try {
                    var encoded = hash.substring(1);
                    var decoded = atob(encoded);
                    // Handle UTF-8.
                    var bytes = new Uint8Array(decoded.length);
                    for (var i = 0; i < decoded.length; i++) {
                        bytes[i] = decoded.charCodeAt(i);
                    }
                    return new TextDecoder().decode(bytes);
                } catch (e) {
                    return decodeURIComponent(hash.substring(1));
                }
            }
            return '';
        }

        // Main rendering.
        (function() {
            var mermaidCode = getMermaidCode();

            if (!mermaidCode) {
                document.getElementById('loading').style.display = 'none';
                var errorEl = document.getElementById('error-msg');
                errorEl.textContent = 'No mermaid code provided.';
                errorEl.style.display = 'block';
                return;
            }

            _mermaidCode = mermaidCode;

            var id = 'mermaid-viewer-' + Math.random().toString(36).substr(2, 9);
            mermaid.render(id, mermaidCode).then(function(result) {
                var svg = result.svg;

                // Parse SVG dimensions.
                var parser = new DOMParser();
                var svgDoc = parser.parseFromString(svg, 'image/svg+xml');
                var svgEl = svgDoc.querySelector('svg');
                var vb = svgEl.getAttribute('viewBox');
                var w = 800, h = 600;
                if (vb) {
                    var parts = vb.split(/[\s,]+/).map(Number);
                    if (parts.length === 4) { w = parts[2]; h = parts[3]; }
                }
                var ew = svgEl.getAttribute('width');
                var eh = svgEl.getAttribute('height');
                if (ew && !ew.endsWith('%')) w = parseFloat(ew);
                if (eh && !eh.endsWith('%')) h = parseFloat(eh);

                // Use data URI to avoid tainted canvas.
                var svgDataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);

                var scale = 2;
                var canvasW = Math.min(Math.round(w * scale), 2048);
                var canvasH = Math.min(Math.round(h * scale), 2048);

                var img = new Image();
                img.onload = function() {
                    var canvas = document.getElementById('render-canvas');
                    canvas.width = canvasW;
                    canvas.height = canvasH;
                    var ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#1e1e2e';
                    ctx.fillRect(0, 0, canvasW, canvasH);
                    ctx.drawImage(img, 0, 0, canvasW, canvasH);

                    _pngBase64 = canvas.toDataURL('image/png');

                    var diagramImg = document.getElementById('diagram-img');
                    diagramImg.src = _pngBase64;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('diagram-wrapper').style.display = 'inline-block';
                    document.getElementById('btn-bar').style.display = 'flex';
                };
                img.onerror = function() {
                    document.getElementById('loading').style.display = 'none';
                    var errorEl = document.getElementById('error-msg');
                    errorEl.textContent = 'Failed to render SVG to image.';
                    errorEl.style.display = 'block';
                };
                img.src = svgDataUri;
            }).catch(function(e) {
                document.getElementById('loading').style.display = 'none';
                var errorEl = document.getElementById('error-msg');
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.style.display = 'block';
            });
        })();
    </script>
</body>
</html>

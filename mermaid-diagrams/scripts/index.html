<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Diagrams</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body>
    <canvas id="render-canvas" style="display: none;"></canvas>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#1e1e2e',
                primaryColor: '#2d2d44',
                primaryTextColor: '#e0e0e0',
                primaryBorderColor: '#4a4a6a',
                lineColor: '#7c7caa',
                secondaryColor: '#2a2a3d',
                tertiaryColor: '#252538',
                fontFamily: 'system-ui, -apple-system, sans-serif',
                fontSize: '14px'
            },
            flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
            sequence: { useMaxWidth: false },
            er: { useMaxWidth: false }
        });

        // Extract mermaid code from the data parameter.
        // The Edge Gallery app may pass data with raw newlines and unescaped
        // double quotes (e.g. pie chart syntax: "Dogs" : 386), which breaks
        // JSON.parse. We use a multi-strategy approach.
        function extractMermaidCode(data) {
            if (typeof data !== 'string') return data || '';

            // Strategy 1: Standard JSON parse after sanitizing control characters.
            var sanitized = data.replace(/[\x00-\x1f]/g, function(ch) {
                var code = ch.charCodeAt(0);
                if (code === 0x0a) return '\\n';
                if (code === 0x0d) return '\\r';
                if (code === 0x09) return '\\t';
                return '\\u' + ('0000' + code.toString(16)).slice(-4);
            });
            try {
                var json = JSON.parse(sanitized);
                return json.mermaid || json.code || '';
            } catch(e) { /* fall through */ }

            // Strategy 2: Extract value from {"mermaid":"..."} or {"code":"..."}
            // even if the JSON is broken by raw quotes/newlines inside the value.
            var keyMatch = data.match(/"(?:mermaid|code)"\s*:\s*"/);
            if (keyMatch) {
                var startIdx = keyMatch.index + keyMatch[0].length;
                var lastBrace = data.lastIndexOf('"}');
                var endIdx = lastBrace > startIdx ? lastBrace : data.lastIndexOf('"');
                if (endIdx > startIdx) {
                    var raw = data.substring(startIdx, endIdx);
                    raw = raw.replace(/\\n/g, '\n').replace(/\\r/g, '\r').replace(/\\t/g, '\t').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                    return raw;
                }
            }

            // Strategy 3: The entire data string is raw mermaid code.
            return data;
        }

        // Fix common Mermaid syntax errors that LLMs generate.
        // Gantt chart issue: LLMs write "Task A: Requirements Gathering, a1, ..."
        // but Mermaid's parser treats commas as field separators, so the extra
        // text between ":" and the task ID causes "Cannot read properties of
        // undefined (reading 'type')". Fix: if a gantt task line has a comma
        // between ":" and the task ID, move the extra text before the colon.
        function sanitizeMermaidCode(code) {
            var lines = code.split('\n');
            var inGantt = false;
            for (var i = 0; i < lines.length; i++) {
                var trimmed = lines[i].trim().toLowerCase();
                if (trimmed === 'gantt') {
                    inGantt = true;
                    continue;
                }
                // Stop fixing at the next diagram type declaration
                if (inGantt && /^[a-z]/.test(trimmed) && !/^(section|title|dateformat|axisformat|excludes|includes|todaymarker|tickinterval)$/i.test(trimmed.split(/\s/)[0])) {
                    // Could be another diagram type — stop
                    // Actually, gantt directives are limited, so we keep going
                    // but skip section/title lines
                }
                if (inGantt) {
                    // Fix: "Task A: Some Description, id, ..." → "Some Description :id, ..."
                    // Pattern: word colon text comma word comma ...
                    // The colon separates title from task spec. If there's text
                    // with commas between the colon and the task ID, merge it.
                    var match = lines[i].match(/^(\s*)([^:]+):\s*([^,:]+),\s*([a-z]\w*)\s*,\s*(.+)/i);
                    if (match) {
                        var indent = match[1];
                        var prefix = match[2].trim();
                        var desc = match[3].trim();
                        var taskId = match[4];
                        var rest = match[5];
                        // Reconstruct: "prefix desc :taskId, rest"
                        lines[i] = indent + prefix + ' ' + desc + ' :' + taskId + ', ' + rest;
                    }
                }
            }
            return lines.join('\n');
        }

        // Encode mermaid code as base64 for passing in a URL hash.
        function encodeMermaidForUrl(code) {
            var bytes = new TextEncoder().encode(code);
            var binary = '';
            for (var i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        window['ai_edge_gallery_get_result'] = function(data, secret) {
            var mermaidCode = extractMermaidCode(data);

            if (!mermaidCode || typeof mermaidCode !== 'string') {
                return JSON.stringify({ result: null, error: 'No mermaid code provided.' });
            }

            // Fix common syntax errors (e.g. Gantt task descriptions with commas)
            mermaidCode = sanitizeMermaidCode(mermaidCode);

            return new Promise(function(resolve, reject) {
                var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                mermaid.render(id, mermaidCode).then(function(result) {
                    var svg = result.svg;

                    // Parse SVG dimensions to compute aspect ratio for the webview.
                    var parser = new DOMParser();
                    var svgDoc = parser.parseFromString(svg, 'image/svg+xml');
                    var svgEl = svgDoc.querySelector('svg');
                    var vb = svgEl.getAttribute('viewBox');
                    var w = 800, h = 600;
                    if (vb) {
                        var parts = vb.split(/[\s,]+/).map(Number);
                        if (parts.length === 4) { w = parts[2]; h = parts[3]; }
                    }
                    var ew = svgEl.getAttribute('width');
                    var eh = svgEl.getAttribute('height');
                    if (ew && !ew.endsWith('%')) w = parseFloat(ew);
                    if (eh && !eh.endsWith('%')) h = parseFloat(eh);

                    // Aspect ratio = width / height. The webview uses this to size itself.
                    // Add padding for the button bar (~44px) and container padding.
                    var aspectRatio = w / h;

                    // Build webview URL with base64-encoded mermaid code in hash.
                    var viewerUrl = 'viewer.html#' + encodeMermaidForUrl(mermaidCode);

                    resolve(JSON.stringify({
                        result: 'Diagram rendered',
                        webview: { url: viewerUrl, aspectRatio: aspectRatio },
                        error: null
                    }));
                }).catch(function(e) {
                    resolve(JSON.stringify({ result: null, error: 'Failed: ' + e.message }));
                });
            });
        };
    </script>
</body>
</html>
